
services:
  next-app:
    build: .
    container_name: next-app
    ports:
      - '3000:3000'
      - '5555:5555'
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
     - next_mysql
  next_mysql:
    image: mysql:8.0
    container_name: next_mysql
    restart: always
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'root123' 
      MYSQL_DATABASE: 'nextdb'
    volumes:
      - my-app_mysql_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:5.2.2 
    container_name: next_phpmyadmin
    restart: always
    ports:
      - '8080:80'
    environment:
      PMA_HOST: next_mysql 
      PMA_USER: root
      PMA_PASSWORD: 'root123'
    depends_on:
      - next_mysql
volumes:
  next_node_modules:
  my-app_mysql_data:


